<button
    #element
    class="bts-button"
    [sabloTabseq]="tabSeq()"
    [id]="servoyApi.getMarkupId()"
    [svyTooltip]="toolTipText()">
    @if (imageStyleClass()) {
      <span [class]="imageStyleClass()" aria-hidden="true"></span>
    }
    @if (showAs() !== 'html' && showAs() !== 'trusted_html') {
      {{text()}}
    }
    @if ((showAs() === 'html' || showAs() === 'trusted_html')) {
      <span [innerHTML]="text() | htmlFilter | trustAsHtml:isTrustedHTML()"></span>
    }
    @if (trailingImageStyleClass()) {
      <span [class]="trailingImageStyleClass()" aria-hidden="true"></span>
    }
</button>
